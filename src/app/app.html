<main class="main">
  <button (click)="applicationsService.addApplication()">Add application</button>
  <select [value]="applicationsService.selectedStatus" (change)="applicationsService.updateFilter($event)">
    <option value="">nichts</option>
    <option value="beworben">beworben</option>
    <option value="Interview">Interview</option>
    <option value="Zusage">Zusage</option>
    <option value="Absage">Absage</option>
  </select>
  @for (app of applicationsService.filteredApplications; track app.firma){
  <app-application-item [application]="app" (deleteClicked)="applicationsService.deleteApplication($event)" />
  }
</main>
